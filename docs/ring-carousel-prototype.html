<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>每日诗文 · 圆环轮播原型</title>
<style>
  :root {
    --bg: #F5F0EB;
    --surface: #FAF6F1;
    --surface-2: #ECE3D6;
    --text: #1D1B18;
    --text-2: #4C443C;
    --text-3: #7A6B4E;
    --accent: #D97757;
    --accent-soft: #FAE5D8;
    --outline: #D8CDBC;
    --shadow: 0 8px 32px rgba(60, 40, 20, 0.12);
    --shadow-soft: 0 2px 12px rgba(60, 40, 20, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
      "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--text);
    background: var(--bg);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ============ Header ============ */
  header {
    padding: 16px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    z-index: 10;
  }
  header h1 {
    font-family: "Songti SC", "STSong", serif;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  header h1 .accent { color: var(--accent); }
  header .subtitle {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 2px;
  }

  /* ============ Stage ============ */
  .stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
    perspective-origin: 50% 50%;
    touch-action: pan-y;
    user-select: none;
  }

  .viewport {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
  }
  .viewport.dragging { cursor: grabbing; }

  /* Ring container (3D) */
  .ring {
    position: relative;
    width: 360px;
    height: 480px;
    transform-style: preserve-3d;
  }
  .ring.animating,
  .ring.dragging { transition: none; }
  .ring.mode-linear {
    transform-style: flat;
    width: auto;
    height: 480px;
  }

  /* Card base */
  .card {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 360px;
    height: 480px;
    border-radius: 24px;
    background: var(--surface);
    box-shadow: var(--shadow);
    overflow: hidden;
    transform-style: preserve-3d;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transition: opacity 0.3s ease-out;
    will-change: transform, opacity;
    pointer-events: none;
  }
  .ring.animating .card,
  .ring.dragging .card,
  .card.dragging {
    transition: none;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }

  .card .title {
    font-family: "Songti SC", "STSong", "Source Han Serif SC",
      "Noto Serif CJK SC", serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .card .author {
    font-size: 14px;
    color: var(--text-2);
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }
  .card .content {
    font-family: "Songti SC", "STSong", "Source Han Serif SC",
      "Noto Serif CJK SC", serif;
    font-size: 16px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-line;
    max-width: 100%;
  }
  .card .dynasty {
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-family: "Songti SC", "STSong", serif;
    font-size: 56px;
    font-weight: 500;
    color: var(--accent);
    opacity: 0.10;
    line-height: 1;
    letter-spacing: 0.05em;
  }
  .card .index {
    position: absolute;
    top: 12px;
    left: 16px;
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.1em;
  }

  /* Linear mode cards */
  .ring.mode-linear .card {
    transform: translate(-50%, -50%) !important;
    transition: opacity 0.3s ease-out;
  }
  .ring.mode-linear.animating .card,
  .ring.mode-linear.dragging .card {
    transition: none;
  }

  /* ============ Edge indicators ============ */
  .edge-hint {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--outline);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 5;
  }
  .edge-hint.left { left: 16px; }
  .edge-hint.right { right: 16px; }
  .edge-hint.show { opacity: 0.7; }

  /* ============ Controls ============ */
  .controls {
    padding: 12px 24px 20px;
    background: var(--bg);
    border-top: 1px solid var(--outline);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .control-row .label {
    font-size: 12px;
    color: var(--text-2);
    letter-spacing: 0.05em;
    min-width: 64px;
  }

  .toggle-group {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--outline);
    border-radius: 999px;
    padding: 2px;
  }
  .toggle-group button {
    background: transparent;
    border: none;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text-2);
    cursor: pointer;
    border-radius: 999px;
    transition: background 0.2s, color 0.2s;
    font-family: inherit;
  }
  .toggle-group button:hover { color: var(--text); }
  .toggle-group button.active {
    background: var(--accent);
    color: white;
  }

  .index-display {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-2);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }
  .index-display .current {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--outline);
    color: var(--text);
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, transform 0.1s;
  }
  .nav-btn:hover { background: var(--accent-soft); }
  .nav-btn:active { transform: scale(0.96); }

  .help {
    font-size: 11px;
    color: var(--text-3);
    text-align: center;
    padding: 4px 0 0;
    line-height: 1.6;
  }
  .help kbd {
    background: var(--surface);
    border: 1px solid var(--outline);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 10px;
  }

  /* Drag hint when no interaction yet */
  .drag-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text-3);
    background: rgba(250, 246, 241, 0.85);
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--outline);
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.3s;
    z-index: 4;
    backdrop-filter: blur(4px);
  }
  .drag-hint.hidden { opacity: 0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>每日诗文 · <span class="accent">圆环轮播</span></h1>
    <div class="subtitle">Ring Carousel · 50° 步进 · 低灵敏度 · 已批准</div>
  </div>
</header>

<div class="stage" id="stage">
  <div class="edge-hint left" id="edgeLeft">‹</div>
  <div class="edge-hint right" id="edgeRight">›</div>

  <div class="viewport" id="viewport">
    <div class="ring mode-ring" id="ring">
      <!-- cards injected by JS -->
    </div>
  </div>

  <div class="drag-hint" id="dragHint">← 拖动 / 滑动切换 · 圆环模式无缝循环 →</div>
</div>

<div class="controls">
  <div class="control-row">
    <span class="label">动效</span>
    <div class="toggle-group" id="modeGroup">
      <button data-mode="ring" class="active">圆环</button>
      <button data-mode="linear">线性</button>
    </div>

    <span class="label" style="margin-left: 12px;">步进</span>
    <div class="toggle-group" id="stepGroup">
      <button data-step="40">40°</button>
      <button data-step="45">45°</button>
      <button data-step="50" class="active">50°</button>
      <button data-step="55">55°</button>
      <button data-step="60">60°</button>
    </div>

    <span class="label" style="margin-left: 12px;">灵敏度</span>
    <div class="toggle-group" id="sensGroup">
      <button data-sens="0.25" class="active">低</button>
      <button data-sens="0.4">中</button>
      <button data-sens="0.6">高</button>
    </div>
  </div>

  <div class="control-row">
    <button class="nav-btn" id="prevBtn">‹ 上一首</button>
    <button class="nav-btn" id="nextBtn">下一首 ›</button>
    <span class="index-display">
      <span class="current" id="indexCurrent">1</span> /
      <span id="indexTotal">25</span>
    </span>
  </div>

  <div class="help">
    鼠标拖动卡片 或 按 <kbd>←</kbd> <kbd>→</kbd> 切换 · 圆环模式末首自动循环
  </div>
</div>

<script>
// ============ Data ============
const POEMS = [
  { id: 1, title: "静夜思", author: "李白 · 唐", dynasty: "唐", content: "床前明月光，\n疑是地上霜。\n举头望明月，\n低头思故乡。" },
  { id: 2, title: "春晓", author: "孟浩然 · 唐", dynasty: "唐", content: "春眠不觉晓，\n处处闻啼鸟。\n夜来风雨声，\n花落知多少。" },
  { id: 3, title: "登鹳雀楼", author: "王之涣 · 唐", dynasty: "唐", content: "白日依山尽，\n黄河入海流。\n欲穷千里目，\n更上一层楼。" },
  { id: 4, title: "江雪", author: "柳宗元 · 唐", dynasty: "唐", content: "千山鸟飞绝，\n万径人踪灭。\n孤舟蓑笠翁，\n独钓寒江雪。" },
  { id: 5, title: "望庐山瀑布", author: "李白 · 唐", dynasty: "唐", content: "日照香炉生紫烟，\n遥看瀑布挂前川。\n飞流直下三千尺，\n疑是银河落九天。" },
  { id: 6, title: "绝句", author: "杜甫 · 唐", dynasty: "唐", content: "两个黄鹂鸣翠柳，\n一行白鹭上青天。\n窗含西岭千秋雪，\n门泊东吴万里船。" },
  { id: 7, title: "枫桥夜泊", author: "张继 · 唐", dynasty: "唐", content: "月落乌啼霜满天，\n江枫渔火对愁眠。\n姑苏城外寒山寺，\n夜半钟声到客船。" },
  { id: 8, title: "游子吟", author: "孟郊 · 唐", dynasty: "唐", content: "慈母手中线，\n游子身上衣。\n临行密密缝，\n意恐迟迟归。\n谁言寸草心，\n报得三春晖。" },
  { id: 9, title: "出塞", author: "王昌龄 · 唐", dynasty: "唐", content: "秦时明月汉时关，\n万里长征人未还。\n但使龙城飞将在，\n不教胡马度阴山。" },
  { id: 10, title: "凉州词", author: "王翰 · 唐", dynasty: "唐", content: "葡萄美酒夜光杯，\n欲饮琵琶马上催。\n醉卧沙场君莫笑，\n古来征战几人回？" },
  { id: 11, title: "送杜少府之任蜀州", author: "王勃 · 唐", dynasty: "唐", content: "城阙辅三秦，\n风烟望五津。\n与君离别意，\n同是宦游人。\n海内存知己，\n天涯若比邻。\n无为在歧路，\n儿女共沾巾。" },
  { id: 12, title: "黄鹤楼送孟浩然之广陵", author: "李白 · 唐", dynasty: "唐", content: "故人西辞黄鹤楼，\n烟花三月下扬州。\n孤帆远影碧空尽，\n唯见长江天际流。" },
  { id: 13, title: "春望", author: "杜甫 · 唐", dynasty: "唐", content: "国破山河在，\n城春草木深。\n感时花溅泪，\n恨别鸟惊心。\n烽火连三月，\n家书抵万金。\n白头搔更短，\n浑欲不胜簪。" },
  { id: 14, title: "乌衣巷", author: "刘禹锡 · 唐", dynasty: "唐", content: "朱雀桥边野草花，\n乌衣巷口夕阳斜。\n旧时王谢堂前燕，\n飞入寻常百姓家。" },
  { id: 15, title: "江南春", author: "杜牧 · 唐", dynasty: "唐", content: "千里莺啼绿映红，\n水村山郭酒旗风。\n南朝四百八十寺，\n多少楼台烟雨中。" },
  { id: 16, title: "水调歌头·明月几时有", author: "苏轼 · 宋", dynasty: "宋", content: "明月几时有？把酒问青天。\n不知天上宫阙，今夕是何年。\n我欲乘风归去，又恐琼楼玉宇，高处不胜寒。\n起舞弄清影，何似在人间。\n转朱阁，低绮户，照无眠。\n不应有恨，何事长向别时圆？\n人有悲欢离合，月有阴晴圆缺，此事古难全。\n但愿人长久，千里共婵娟。" },
  { id: 17, title: "念奴娇·赤壁怀古", author: "苏轼 · 宋", dynasty: "宋", content: "大江东去，浪淘尽，千古风流人物。\n故垒西边，人道是，三国周郎赤壁。\n乱石穿空，惊涛拍岸，卷起千堆雪。\n江山如画，一时多少豪杰。\n遥想公瑾当年，小乔初嫁了，雄姿英发。\n羽扇纶巾，谈笑间，樯橹灰飞烟灭。\n故国神游，多情应笑我，早生华发。\n人生如梦，一尊还酹江月。" },
  { id: 18, title: "声声慢·寻寻觅觅", author: "李清照 · 宋", dynasty: "宋", content: "寻寻觅觅，冷冷清清，凄凄惨惨戚戚。\n乍暖还寒时候，最难将息。\n三杯两盏淡酒，怎敌他、晚来风急？\n雁过也，正伤心，却是旧时相识。\n满地黄花堆积。憔悴损，如今有谁堪摘？\n守着窗儿，独自怎生得黑？\n梧桐更兼细雨，到黄昏、点点滴滴。\n这次第，怎一个愁字了得！" },
  { id: 19, title: "虞美人·春花秋月何时了", author: "李煜 · 五代", dynasty: "五代", content: "春花秋月何时了？往事知多少。\n小楼昨夜又东风，故国不堪回首月明中。\n雕栏玉砌应犹在，只是朱颜改。\n问君能有几多愁？恰似一江春水向东流。" },
  { id: 20, title: "满江红·怒发冲冠", author: "岳飞 · 宋", dynasty: "宋", content: "怒发冲冠，凭栏处、潇潇雨歇。\n抬望眼、仰天长啸，壮怀激烈。\n三十功名尘与土，八千里路云和月。\n莫等闲、白了少年头，空悲切。\n靖康耻，犹未雪。臣子恨，何时灭！\n驾长车，踏破贺兰山缺。\n壮志饥餐胡虏肉，笑谈渴饮匈奴血。\n待从头、收拾旧山河，朝天阙。" },
  { id: 21, title: "关雎", author: "无名氏 · 先秦", dynasty: "先秦", content: "关关雎鸠，在河之洲。\n窈窕淑女，君子好逑。\n参差荇菜，左右流之。\n窈窕淑女，寤寐求之。\n求之不得，寤寐思服。\n悠哉悠哉，辗转反侧。\n参差荇菜，左右采之。\n窈窕淑女，琴瑟友之。\n参差荇菜，左右芼之。\n窈窕淑女，钟鼓乐之。" },
  { id: 22, title: "蒹葭", author: "无名氏 · 先秦", dynasty: "先秦", content: "蒹葭苍苍，白露为霜。\n所谓伊人，在水一方。\n溯洄从之，道阻且长。\n溯游从之，宛在水中央。\n蒹葭萋萋，白露未晞。\n所谓伊人，在水之湄。\n溯洄从之，道阻且跻。\n溯游从之，宛在水中坻。\n蒹葭采采，白露未已。\n所谓伊人，在水之涘。\n溯洄从之，道阻且右。\n溯游从之，宛在水中沚。" },
  { id: 23, title: "饮酒（其五）", author: "陶渊明 · 魏晋", dynasty: "魏晋", content: "结庐在人境，而无车马喧。\n问君何能尔？心远地自偏。\n采菊东篱下，悠然见南山。\n山气日夕佳，飞鸟相与还。\n此中有真意，欲辨已忘言。" },
  { id: 24, title: "天净沙·秋思", author: "马致远 · 元", dynasty: "元", content: "枯藤老树昏鸦，\n小桥流水人家，\n古道西风瘦马。\n夕阳西下，\n断肠人在天涯。" },
  { id: 25, title: "临江仙·滚滚长江东逝水", author: "杨慎 · 明", dynasty: "明", content: "滚滚长江东逝水，浪花淘尽英雄。\n是非成败转头空。\n青山依旧在，几度夕阳红。\n白发渔樵江渚上，惯看秋月春风。\n一壶浊酒喜相逢。\n古今多少事，都付笑谈中。" },
];

// ============ Build cards ============
const ring = document.getElementById('ring');
const indexCurrent = document.getElementById('indexCurrent');
const indexTotal = document.getElementById('indexTotal');
const dragHint = document.getElementById('dragHint');
const edgeLeft = document.getElementById('edgeLeft');
const edgeRight = document.getElementById('edgeRight');

indexTotal.textContent = POEMS.length;

const cardEls = POEMS.map((p, i) => {
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.index = i;
  el.innerHTML = `
    <div class="card-inner">
      <div class="index">${String(i + 1).padStart(2, '0')}</div>
      <div class="title">${escapeHtml(p.title)}</div>
      <div class="author">${escapeHtml(p.author)}</div>
      <div class="content">${escapeHtml(p.content)}</div>
      <div class="dynasty">${escapeHtml(p.dynasty)}</div>
    </div>
  `;
  ring.appendChild(el);
  return el;
});

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

  // ============ Carousel state ============
const state = {
  position: 0,            // continuous, increments per card
  mode: 'ring',
  stepAngle: 50,
  sensitivity: 0.25,
  R: 420,                 // ring radius
  cardWidth: 360,
  cardGap: 24,

  // Drag tracking
  isDragging: false,
  startX: 0,
  startPosition: 0,
  lastX: 0,
  lastT: 0,
  velocity: 0,

  // Animation
  animating: false,
  animStart: 0,
  animFrom: 0,
  animTo: 0,
  animDuration: 420,
};

const N = POEMS.length;

function getFrontIndex() {
  return ((Math.round(state.position) % N) + N) % N;
}

function wrapDist(i, front) {
  const d = Math.abs(i - front);
  return Math.min(d, N - d);
}

// ============ Render ============
function render(p) {
  if (state.mode === 'ring') {
    renderRing(p);
  } else {
    renderLinear(p);
  }
  indexCurrent.textContent = getFrontIndex() + 1;
}

function cardEffectiveAngle(i, p) {
  // Wrapped offset in [-N/2, N/2]
  const raw = i - p;
  const half = N / 2;
  let wrapped = ((raw % N) + N + half) % N - half;
  return wrapped * state.stepAngle;
}

function renderRing(p) {
  const front = Math.round(p);
  for (let i = 0; i < N; i++) {
    const card = cardEls[i];
    const angle = cardEffectiveAngle(i, p);
    const absAngle = Math.abs(angle);
    let opacity, zIndex;
    if (absAngle > 100) {
      opacity = 0;
      zIndex = 1;
    } else if (absAngle > state.stepAngle + 10) {
      opacity = 0.5;
      zIndex = 1;
    } else if (absAngle > state.stepAngle - 5) {
      opacity = 0.85;
      zIndex = 2;
    } else {
      opacity = 1;
      zIndex = 3;
    }
    const depth = 1 - absAngle / 200 * 0.15;
    card.style.transform =
      `translate(-50%, -50%) rotateY(${angle}deg) translateZ(${state.R}px) scale(${depth})`;
    card.style.opacity = opacity;
    card.style.zIndex = zIndex;
  }
}

function renderLinear(p) {
  const slot = state.cardWidth + state.cardGap;
  const front = Math.round(p);
  for (let i = 0; i < N; i++) {
    const card = cardEls[i];
    const dist = wrapDist(i, front);
    let opacity;
    if (dist > 1) opacity = 0;
    else if (dist === 1) opacity = 0.7;
    else opacity = 1;
    const xOffset = (i - p) * slot;
    card.style.left = `50%`;
    card.style.top = `50%`;
    card.style.transform = `translate(calc(-50% + ${xOffset}px), -50%)`;
    card.style.opacity = opacity;
    card.style.zIndex = dist === 0 ? 3 : (dist === 1 ? 2 : 1);
  }
  // No ring transform needed in linear mode — cards position themselves
  ring.style.transform = `none`;
}

// ============ Animation ============
function animateTo(targetPosition, duration = state.animDuration) {
  state.animating = true;
  state.animStart = performance.now();
  state.animFrom = state.position;
  state.animTo = targetPosition;
  ring.classList.add('animating');
  cardEls.forEach(c => c.classList.add('animating'));
  requestAnimationFrame(tick);
}

function tick(now) {
  if (!state.animating) return;
  const t = Math.min((now - state.animStart) / state.animDuration, 1);
  const eased = 1 - Math.pow(1 - t, 3);
  const visual = state.animFrom + (state.animTo - state.animFrom) * eased;
  render(visual);
  if (t < 1) {
    requestAnimationFrame(tick);
  } else {
    state.animating = false;
    state.position = state.animTo;
    render(state.position);
    ring.classList.remove('animating');
    cardEls.forEach(c => c.classList.remove('animating'));
  }
}

// ============ Drag handlers ============
const viewport = document.getElementById('viewport');

viewport.addEventListener('pointerdown', onPointerDown);
window.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerup', onPointerUp);
window.addEventListener('pointercancel', onPointerUp);

function onPointerDown(e) {
  if (state.animating) return;
  if (e.button !== undefined && e.button !== 0) return;
  state.isDragging = true;
  state.startX = e.clientX;
  state.startPosition = state.position;
  state.lastX = e.clientX;
  state.lastT = performance.now();
  state.velocity = 0;
  viewport.classList.add('dragging');
  ring.classList.add('dragging');
  cardEls.forEach(c => c.classList.add('dragging'));
  viewport.setPointerCapture(e.pointerId);
  hideDragHint();
}

function onPointerMove(e) {
  if (!state.isDragging) return;
  const dx = e.clientX - state.startX;
  const cardsPerPixel = state.sensitivity / state.stepAngle;
  // Negative drag (left swipe) → advance (next card)
  const newPos = state.startPosition - dx * cardsPerPixel;
  // Linear mode: clamp to [0, N-1] with rubber band beyond
  if (state.mode === 'linear') {
    state.position = clampWithRubberBand(newPos, 0, N - 1);
  } else {
    state.position = newPos;
  }
  const now = performance.now();
  const dt = now - state.lastT;
  if (dt > 0) {
    state.velocity = (e.clientX - state.lastX) / dt;
  }
  state.lastX = e.clientX;
  state.lastT = now;
  // Show edge hints
  if (state.mode === 'linear') {
    if (state.position < 0) edgeLeft.classList.add('show');
    else edgeLeft.classList.remove('show');
    if (state.position > N - 1) edgeRight.classList.add('show');
    else edgeRight.classList.remove('show');
  } else {
    edgeLeft.classList.remove('show');
    edgeRight.classList.remove('show');
  }
  render(state.position);
}

function onPointerUp(e) {
  if (!state.isDragging) return;
  state.isDragging = false;
  viewport.classList.remove('dragging');
  ring.classList.remove('dragging');
  cardEls.forEach(c => c.classList.remove('dragging'));
  edgeLeft.classList.remove('show');
  edgeRight.classList.remove('show');

  // Fling: project velocity over ~200ms in card units
  const FLING_MS = 200;
  const cardsPerPixel = state.sensitivity / state.stepAngle;
  const flingDelta = -state.velocity * FLING_MS * cardsPerPixel;
  let target = Math.round(state.position + flingDelta);

  if (state.mode === 'linear') {
    target = Math.max(0, Math.min(N - 1, target));
  }

  if (target !== Math.round(state.position)) {
    animateTo(target, 420);
  } else {
    animateTo(state.position, 250);
  }
}

function clampWithRubberBand(v, min, max) {
  if (v < min) {
    const over = min - v;
    return min - over / (1 + over / 80);
  }
  if (v > max) {
    const over = v - max;
    return max + over / (1 + over / 80);
  }
  return v;
}

// ============ Controls ============
document.querySelectorAll('#modeGroup button').forEach(btn => {
  btn.addEventListener('click', () => {
    const m = btn.dataset.mode;
    if (m === state.mode) return;
    state.mode = m;
    document.querySelectorAll('#modeGroup button').forEach(b => b.classList.toggle('active', b === btn));
    ring.classList.toggle('mode-ring', m === 'ring');
    ring.classList.toggle('mode-linear', m === 'linear');
    // Snap to current
    animateTo(state.position, 250);
  });
});

document.querySelectorAll('#stepGroup button').forEach(btn => {
  btn.addEventListener('click', () => {
    const a = parseFloat(btn.dataset.step);
    state.stepAngle = a;
    document.querySelectorAll('#stepGroup button').forEach(b => b.classList.toggle('active', b === btn));
    animateTo(state.position, 250);
  });
});

document.querySelectorAll('#sensGroup button').forEach(btn => {
  btn.addEventListener('click', () => {
    const s = parseFloat(btn.dataset.sens);
    state.sensitivity = s;
    document.querySelectorAll('#sensGroup button').forEach(b => b.classList.toggle('active', b === btn));
  });
});

document.getElementById('prevBtn').addEventListener('click', () => {
  animateTo(Math.round(state.position) - 1, 350);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  animateTo(Math.round(state.position) + 1, 350);
});

// Keyboard
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') {
    animateTo(Math.round(state.position) - 1, 350);
    hideDragHint();
  } else if (e.key === 'ArrowRight') {
    animateTo(Math.round(state.position) + 1, 350);
    hideDragHint();
  }
});

function hideDragHint() {
  dragHint.classList.add('hidden');
}

// Initial render
render(state.position);

// Auto-hide hint after 4s
setTimeout(hideDragHint, 4000);
</script>
</body>
</html>
